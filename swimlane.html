<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流程泳道圖產生器</title>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: #f0f0ec;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #4d4d2e;
    color: white;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: bold; }
  header span { font-size: 12px; opacity: 0.6; }
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .left-panel {
    width: 38%;
    min-width: 280px;
    background: #fafaf8;
    border-right: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 10px;
  }
  .left-panel h2 { font-size: 14px; color: #555; font-weight: 600; }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  textarea {
    flex: 1;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.7;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 12px;
    background: #fafaf8;
    color: #333;
    resize: none;
    outline: none;
  }
  textarea:focus { border-color: #5a7a6a; box-shadow: 0 0 0 2px rgba(90,122,106,0.2); }
  .error-box {
    background: #fff0f0;
    border: 1px solid #ffaaaa;
    border-radius: 5px;
    padding: 8px 12px;
    color: #cc3333;
    font-size: 12px;
  }
  .hint {
    font-size: 11px;
    color: #888;
    line-height: 1.6;
  }
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 10px;
    overflow: hidden;
  }
  .right-panel h2 { font-size: 14px; color: #555; font-weight: 600; }
  .right-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .diagram-area {
    flex: 1;
    overflow: auto;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
  }
  #diagram-svg { display: block; }
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #aaa;
    font-size: 14px;
  }
  btn, .btn { display: inline-block; }
  .btn-primary {
    background: #4d4d2e;
    color: white;
    border: none;
    padding: 7px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .btn-primary:hover { background: #3a3a1e; }
  .btn-secondary {
    background: #5a7a6a;
    color: white;
    border: none;
    padding: 7px 16px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .btn-secondary:hover { background: #486858; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    font-size: 11px;
    color: #555;
    border-top: 1px solid #ddd;
    padding-top: 8px;
    flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
</style>
</head>
<body>

<header>
  <h1>流程泳道圖產生器</h1>
  <span>業務流程 L3/L4 泳道圖</span>
  <span style="margin-left:auto;font-size:11px;opacity:0.5">輸入後點擊「產生圖表」</span>
</header>

<div class="main">
  <!-- Left: Input -->
  <div class="left-panel">
    <div class="toolbar">
      <h2>流程輸入</h2>
      <button class="btn-primary" onclick="generate()">▶ 產生圖表</button>
    </div>
    <textarea id="yaml-input" spellcheck="false"></textarea>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div class="hint">
      <b>type 可填：</b>start（開始）、end（結束）、task（任務）、gateway（網關/菱形）、activity（L3活動）、interaction（互動）<br>
      <b>connections</b> 裡的 label 欄可填「是」「否」等箭頭文字
    </div>
  </div>

  <!-- Right: Diagram -->
  <div class="right-panel">
    <div class="right-toolbar">
      <h2>預覽</h2>
      <button class="btn-secondary" onclick="downloadPng()">⬇ 下載 PNG</button>
    </div>
    <div class="diagram-area" id="diagram-area">
      <div class="empty-state" id="empty-state">請在左側輸入流程，然後點擊「產生圖表」</div>
      <svg id="diagram-svg" style="display:none"></svg>
    </div>
    <div class="legend">
      <div class="legend-item">
        <svg width="18" height="18"><circle cx="9" cy="9" r="7" fill="white" stroke="black" stroke-width="2"/></svg> 開始事件
      </div>
      <div class="legend-item">
        <svg width="18" height="18"><circle cx="9" cy="9" r="7" fill="black"/></svg> 結束事件
      </div>
      <div class="legend-item">
        <svg width="18" height="18"><polygon points="9,1 17,9 9,17 1,9" fill="white" stroke="#333" stroke-width="1.5"/></svg> 網關
      </div>
      <div class="legend-item">
        <svg width="30" height="18"><rect x="1" y="4" width="28" height="11" rx="2" fill="white" stroke="#333" stroke-width="1.5"/></svg> L4 任務
      </div>
      <div class="legend-item">
        <svg width="30" height="18"><rect x="1" y="4" width="28" height="11" rx="2" fill="#e8f4ee" stroke="#2d7a5a" stroke-width="2"/></svg> L3 活動
      </div>
      <div class="legend-item">
        <svg width="30" height="18"><rect x="1" y="4" width="28" height="11" rx="2" fill="#c8c8c8" stroke="#666" stroke-width="1.5"/></svg> 互動
      </div>
      <div class="legend-item">
        <svg width="32" height="18">
          <defs><marker id="la" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#333"/></marker></defs>
          <line x1="2" y1="9" x2="26" y2="9" stroke="#333" stroke-width="1.5" marker-end="url(#la)"/>
        </svg> 順序流
      </div>
      <div class="legend-item">
        <svg width="32" height="18"><line x1="2" y1="9" x2="28" y2="9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/></svg> 消息流
      </div>
    </div>
  </div>
</div>

<script>
// ─── Default example ──────────────────────────────────────────────────────────
const DEFAULT = `title: 建立商機報價

lanes:
  - name: 客戶
  - name: BG/BU業務
  - name: BG/BU PM
  - name: BG/BU Head

steps:
  - id: s1
    lane: 客戶
    type: start
    label: 客戶提出報價請求

  - id: s2
    lane: BG/BU業務
    type: task
    label: 確認商機需求

  - id: s3
    lane: BG/BU PM
    type: task
    label: 收集成本資料

  - id: s4
    lane: BG/BU業務
    type: task
    label: 建立報價單

  - id: s5
    lane: BG/BU Head
    type: task
    label: 執行報價單簽核

  - id: s6
    lane: BG/BU Head
    type: gateway
    label: 是否核准

  - id: s7
    lane: BG/BU業務
    type: task
    label: 寄送報價單

  - id: s8
    lane: 客戶
    type: gateway
    label: 是否接受報價單

  - id: s9
    lane: 客戶
    type: end
    label: 結束

  - id: s10
    lane: 客戶
    type: gateway
    label: 是否繼續報價

  - id: s11
    lane: 客戶
    type: end
    label: 結束

connections:
  - from: s1
    to: s2
  - from: s1
    to: s3
  - from: s2
    to: s4
  - from: s3
    to: s4
  - from: s4
    to: s5
  - from: s5
    to: s6
  - from: s6
    to: s7
    label: "是"
  - from: s7
    to: s8
  - from: s8
    to: s9
    label: "是"
  - from: s8
    to: s10
    label: "否"
  - from: s10
    to: s11
    label: "否"
`;

document.getElementById('yaml-input').value = DEFAULT;

// ─── Layout constants ─────────────────────────────────────────────────────────
const TITLE_H = 44;
const LANE_H = 110;
const LANE_HEADER_W = 115;
const COL_W = 165;
const NODE_W = 108;
const NODE_H = 48;
const CIRCLE_R = 19;
const DIAMOND = 38;

const LANE_COLORS = ['#5a7a6a','#6b7a50','#7a6a5a','#4a6a7a','#7a5a6a','#5a6a7a','#6a7a5a','#7a5a5a'];

// ─── Parser ───────────────────────────────────────────────────────────────────
function parseYaml(text) {
  const raw = jsyaml.load(text);
  if (!raw || typeof raw !== 'object') throw new Error('無效的 YAML 格式');
  const title = raw.title || '未命名流程';
  const rawLanes = raw.lanes || [];
  if (!rawLanes.length) throw new Error('請至少定義一個泳道 (lanes)');
  const lanes = rawLanes.map((l,i) => ({ id:'ln'+i, name: typeof l==='string'?l:(l.name||'泳道'+(i+1)) }));
  const laneByName = Object.fromEntries(lanes.map(l=>[l.name,l.id]));
  const rawSteps = raw.steps || [];
  if (!rawSteps.length) throw new Error('請至少定義一個步驟 (steps)');
  const validTypes = new Set(['start','end','task','gateway','activity','interaction']);
  const steps = rawSteps.map((s,i) => {
    if (!s.id) throw new Error('步驟 '+(i+1)+' 缺少 id');
    if (!s.lane) throw new Error('步驟 '+s.id+' 缺少 lane');
    if (!laneByName[s.lane]) throw new Error('步驟 '+s.id+' 的 lane "'+s.lane+'" 不存在');
    const type = s.type||'task';
    if (!validTypes.has(type)) throw new Error('步驟 '+s.id+' 的 type "'+type+'" 無效');
    return { id:String(s.id), laneId:laneByName[s.lane], type, label:s.label||'' };
  });
  const stepIds = new Set(steps.map(s=>s.id));
  const rawConns = raw.connections || [];
  const connections = rawConns.map((c,i) => {
    if (!c.from||!c.to) throw new Error('連接 '+(i+1)+' 缺少 from 或 to');
    const from=String(c.from), to=String(c.to);
    if (!stepIds.has(from)) throw new Error('連接: 步驟 "'+from+'" 不存在');
    if (!stepIds.has(to)) throw new Error('連接: 步驟 "'+to+'" 不存在');
    return { from, to, label:c.label||'', dashed:c.dashed||false };
  });
  return { title, lanes, steps, connections };
}

// ─── Layout ───────────────────────────────────────────────────────────────────
function computeLayout(lanes, steps, connections) {
  const laneIdx = Object.fromEntries(lanes.map((l,i)=>[l.id,i]));
  const preds = Object.fromEntries(steps.map(s=>[s.id,[]]));
  const succs = Object.fromEntries(steps.map(s=>[s.id,[]]));
  for (const c of connections) { preds[c.to].push(c.from); succs[c.from].push(c.to); }
  const inDeg = Object.fromEntries(steps.map(s=>[s.id,preds[s.id].length]));
  const col = Object.fromEntries(steps.map(s=>[s.id,0]));
  const queue = steps.filter(s=>inDeg[s.id]===0).map(s=>s.id);
  const visited = new Set();
  while (queue.length) {
    const id = queue.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    for (const nxt of succs[id]||[]) {
      col[nxt] = Math.max(col[nxt], col[id]+1);
      if (--inDeg[nxt] <= 0) queue.push(nxt);
    }
  }
  let nextCol = Math.max(0,...steps.map(s=>col[s.id]))+1;
  for (const s of steps) if (!visited.has(s.id)) col[s.id]=nextCol++;
  const maxCol = Math.max(...steps.map(s=>col[s.id]));
  const laid = steps.map(s => {
    const row = laneIdx[s.laneId];
    const c = col[s.id];
    return { ...s, row, col:c,
      x: LANE_HEADER_W + c*COL_W + COL_W/2,
      y: TITLE_H + row*LANE_H + LANE_H/2 };
  });
  const W = LANE_HEADER_W + (maxCol+1)*COL_W + 20;
  const H = TITLE_H + lanes.length*LANE_H + 4;
  return { laid, W, H };
}

// ─── Border point for arrows ──────────────────────────────────────────────────
function border(step, tx, ty) {
  const {x:cx,y:cy,type} = step;
  const dx=tx-cx, dy=ty-cy, ang=Math.atan2(dy,dx);
  if (type==='start'||type==='end') return {x:cx+CIRCLE_R*Math.cos(ang), y:cy+CIRCLE_R*Math.sin(ang)};
  if (type==='gateway') {
    const ad=Math.abs(dx)+Math.abs(dy);
    if (!ad) return {x:cx,y:cy};
    const t=DIAMOND/ad;
    return {x:cx+dx*t, y:cy+dy*t};
  }
  const hw=NODE_W/2, hh=NODE_H/2;
  if (!dx&&!dy) return {x:cx,y:cy};
  const t = Math.abs(dx)*hh > Math.abs(dy)*hw ? hw/Math.abs(dx) : hh/Math.abs(dy);
  return {x:cx+dx*t, y:cy+dy*t};
}

// ─── SVG helpers ──────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}, children=[]) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  for (const c of children) if (c) e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  return e;
}

function textLines(label, maxCh=13) {
  if (!label) return [''];
  const chars = [...label];
  const lines = [];
  let cur = '';
  for (const ch of chars) {
    cur += ch;
    if (cur.length >= maxCh) { lines.push(cur); cur=''; }
  }
  if (cur) lines.push(cur);
  return lines.length ? lines : [''];
}

function makeText(x, y, lines, opts={}) {
  const g = el('g');
  lines.forEach((line,i) => {
    const dy = (i-(lines.length-1)/2)*14;
    g.appendChild(el('text',{
      x, y: y+dy,
      'text-anchor':'middle',
      'dominant-baseline':'middle',
      'font-size': opts.size||11,
      'font-weight': opts.bold?'bold':'normal',
      fill: opts.fill||'#333',
      'font-family':'Microsoft JhengHei,PingFang TC,sans-serif'
    },[line]));
  });
  return g;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderDiagram(parsed) {
  const { title, lanes, steps, connections } = parsed;
  const { laid, W, H } = computeLayout(lanes, steps, connections);
  const stepMap = Object.fromEntries(laid.map(s=>[s.id,s]));

  const svg = document.getElementById('diagram-svg');
  svg.innerHTML = '';
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // defs / arrowhead
  const defs = el('defs');
  const marker = el('marker',{id:'arr',markerWidth:'8',markerHeight:'8',refX:'6',refY:'3',orient:'auto'});
  marker.appendChild(el('path',{d:'M0,0 L0,6 L8,3 z',fill:'#333'}));
  defs.appendChild(marker);
  svg.appendChild(defs);

  // Title bar
  svg.appendChild(el('rect',{x:0,y:0,width:W,height:TITLE_H,fill:'#4d4d2e'}));
  svg.appendChild(el('text',{x:W/2,y:TITLE_H/2,'text-anchor':'middle','dominant-baseline':'middle',
    fill:'white','font-size':16,'font-weight':'bold','font-family':'Microsoft JhengHei,PingFang TC,sans-serif'
  },[title]));

  // Lanes
  lanes.forEach((lane,i) => {
    const ly = TITLE_H + i*LANE_H;
    const bg = i%2===0?'#ffffff':'#f7f7f3';
    const hc = LANE_COLORS[i%LANE_COLORS.length];
    svg.appendChild(el('rect',{x:LANE_HEADER_W,y:ly,width:W-LANE_HEADER_W,height:LANE_H,fill:bg,stroke:'#ccc','stroke-width':1}));
    svg.appendChild(el('rect',{x:0,y:ly,width:LANE_HEADER_W,height:LANE_H,fill:hc,stroke:'#999','stroke-width':1}));
    const lLines = textLines(lane.name, 6);
    svg.appendChild(makeText(LANE_HEADER_W/2, ly+LANE_H/2, lLines, {size:12,bold:true,fill:'white'}));
  });

  // Arrows (below shapes)
  connections.forEach((conn,i) => {
    const f = stepMap[conn.from], t = stepMap[conn.to];
    if (!f||!t) return;
    const s = border(f,t.x,t.y);
    const e = border(t,f.x,f.y);
    const mid = {x:(s.x+e.x)/2, y:(s.y+e.y)/2};
    let d;
    if (f.row !== t.row) {
      const cpx = s.x + (e.x-s.x)*0.5;
      d = `M ${s.x} ${s.y} Q ${cpx} ${s.y} ${e.x} ${e.y}`;
    } else {
      d = `M ${s.x} ${s.y} L ${e.x} ${e.y}`;
    }
    svg.appendChild(el('path',{d, stroke:'#333','stroke-width':1.5,fill:'none',
      'stroke-dasharray':conn.dashed?'6,4':'none','marker-end':'url(#arr)'}));
    if (conn.label) {
      svg.appendChild(el('rect',{
        x:mid.x - conn.label.length*3.5 - 2, y:mid.y-8,
        width:conn.label.length*7+4, height:14, fill:'white', opacity:0.85
      }));
      svg.appendChild(el('text',{x:mid.x,y:mid.y,'text-anchor':'middle',
        'dominant-baseline':'middle','font-size':10,fill:'#444',
        'font-family':'Microsoft JhengHei,PingFang TC,sans-serif'},[conn.label]));
    }
  });

  // Shapes
  laid.forEach(step => {
    const {x,y,type,label} = step;
    if (type==='start') {
      svg.appendChild(el('circle',{cx:x,cy:y,r:CIRCLE_R,fill:'white',stroke:'black','stroke-width':2}));
      if (label) {
        const g = makeText(x, y+CIRCLE_R+10, textLines(label,10), {size:9,fill:'#555'});
        svg.appendChild(g);
      }
    } else if (type==='end') {
      svg.appendChild(el('circle',{cx:x,cy:y,r:CIRCLE_R,fill:'black',stroke:'black','stroke-width':2}));
      if (label) {
        const g = makeText(x, y+CIRCLE_R+10, textLines(label,10), {size:9,fill:'#555'});
        svg.appendChild(g);
      }
    } else if (type==='gateway') {
      const d2=DIAMOND;
      svg.appendChild(el('polygon',{
        points:`${x},${y-d2} ${x+d2},${y} ${x},${y+d2} ${x-d2},${y}`,
        fill:'white',stroke:'#333','stroke-width':1.5}));
      svg.appendChild(makeText(x,y, textLines(label,8), {size:10}));
    } else {
      const hw=NODE_W/2, hh=NODE_H/2;
      let fill='white', stroke='#333', sw=1.5;
      if (type==='interaction') { fill='#c8c8c8'; stroke='#666'; }
      if (type==='activity') { fill='#e8f4ee'; stroke='#2d7a5a'; sw=2.5; }
      svg.appendChild(el('rect',{x:x-hw,y:y-hh,width:NODE_W,height:NODE_H,
        rx:3,fill,stroke,'stroke-width':sw}));
      const textFill = type==='activity'?'#1a5a3a':'#333';
      svg.appendChild(makeText(x,y, textLines(label,13), {size:11,fill:textFill,bold:type==='activity'}));
    }
  });

  document.getElementById('empty-state').style.display='none';
  svg.style.display='block';
}

// ─── Generate ─────────────────────────────────────────────────────────────────
function generate() {
  const text = document.getElementById('yaml-input').value;
  const errBox = document.getElementById('error-box');
  try {
    const parsed = parseYaml(text);
    renderDiagram(parsed);
    errBox.style.display='none';
  } catch(e) {
    errBox.style.display='block';
    errBox.textContent = '⚠ ' + e.message;
  }
}

// ─── Download PNG ─────────────────────────────────────────────────────────────
function downloadPng() {
  const svg = document.getElementById('diagram-svg');
  if (svg.style.display==='none') { alert('請先產生圖表'); return; }
  const W = +svg.getAttribute('width');
  const H = +svg.getAttribute('height');
  const xml = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([xml], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = W * 2; canvas.height = H * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2,2);
    ctx.fillStyle='white'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    const title = document.getElementById('yaml-input').value.match(/title:\s*(.+)/)?.[1]?.trim()||'swimlane';
    const a = document.createElement('a');
    a.download = title + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

// Auto-generate on load
window.onload = () => generate();
</script>
</body>
</html>
